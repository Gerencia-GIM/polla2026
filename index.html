<style>
  :root {
    --verde: #1a5c2a;
    --verde-mid: #2d8a42;
    --verde-light: #eaf3de;
    --amarillo: #f5c518;
    --gris: #f4f4f4;
    --gris-borde: #e0e0e0;
    --texto: #1a1a1a;
    --texto-sec: #666;
    --radio: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f0; color: var(--texto); font-size: 15px; }

  /* HEADER */
  .header {
    background: var(--verde);
    color: #fff;
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.5px; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 3px; }
  .progress-wrap { margin-top: 10px; background: rgba(255,255,255,0.2); border-radius: 4px; height: 6px; }
  .progress-bar { height: 6px; background: var(--amarillo); border-radius: 4px; transition: width 0.3s; width: 0%; }
  .progress-label { font-size: 11px; opacity: 0.85; margin-top: 4px; }

  /* NOMBRE */
  .nombre-box {
    margin: 12px;
    background: #fff;
    border-radius: var(--radio);
    padding: 14px;
    border: 1.5px solid var(--verde-mid);
  }
  .nombre-box label { font-size: 12px; color: var(--texto-sec); display: block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .nombre-box input {
    width: 100%; border: 1px solid var(--gris-borde); border-radius: 8px;
    padding: 10px 12px; font-size: 16px; color: var(--texto);
    outline: none; background: var(--gris);
  }
  .nombre-box input:focus { border-color: var(--verde-mid); background: #fff; }

  /* TABS */
  .tabs { display: flex; gap: 6px; padding: 0 12px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--gris-borde);
    font-size: 13px;
    font-weight: 500;
    background: #fff;
    color: var(--texto-sec);
    cursor: pointer;
  }
  .tab.active { background: var(--verde); color: #fff; border-color: var(--verde); }

  /* PAGE */
  .page { display: none; padding: 0 12px; }
  .page.active { display: block; }

  /* FECHA HEADER */
  .fecha-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--verde);
    padding: 12px 4px 6px;
    border-bottom: 1.5px solid var(--verde-light);
    margin-bottom: 6px;
  }

  /* PARTIDO CARD */
  .match-card {
    background: #fff;
    border-radius: var(--radio);
    margin-bottom: 8px;
    padding: 10px 12px;
    border: 1px solid var(--gris-borde);
    transition: border-color 0.2s;
  }
  .match-card.filled { border-color: var(--verde-mid); }
  .match-hora { font-size: 11px; color: var(--texto-sec); text-align: center; margin-bottom: 6px; }
  .match-row {
    display: grid;
    grid-template-columns: 1fr 44px 16px 44px 1fr;
    align-items: center;
    gap: 4px;
  }
  .team { font-size: 13px; font-weight: 500; line-height: 1.2; }
  .team.home { text-align: right; }
  .team.away { text-align: left; }
  .sep { text-align: center; font-size: 14px; color: var(--texto-sec); font-weight: 700; }
  .score-input {
    width: 44px;
    height: 40px;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    border: 1.5px solid var(--gris-borde);
    border-radius: 8px;
    background: var(--gris);
    color: var(--texto);
    -moz-appearance: textfield;
    outline: none;
    padding: 0;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: var(--verde-mid); background: #fff; }
  .score-input.set { background: var(--verde-light); border-color: var(--verde-mid); }

  /* BOTONES */
  .btn-area { padding: 16px 12px 32px; }
  .btn-enviar {
    width: 100%;
    padding: 16px;
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: var(--radio);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-appearance: none;
  }
  .btn-enviar:active { background: var(--verde-mid); transform: scale(0.99); }
  .btn-enviar:disabled { background: #aaa; }
  .btn-guardar {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: var(--verde);
    border: 1.5px solid var(--verde);
    border-radius: var(--radio);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    -webkit-appearance: none;
  }
  .btn-guardar:active { background: var(--verde-light); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #fff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--verde); }
  .toast.err { background: #c0392b; }

  /* MODAL ENVIANDO */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    max-width: 280px;
    width: 90%;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--gris-borde);
    border-top-color: var(--verde);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal h3 { font-size: 17px; color: var(--texto); }
  .modal p { font-size: 13px; color: var(--texto-sec); margin-top: 6px; }
  .modal-ok { font-size: 48px; margin-bottom: 12px; }

  /* AVISO CONFIG */
  .aviso-config {
    margin: 0 12px 12px;
    background: #fff8e1;
    border: 1.5px solid #f5c518;
    border-radius: var(--radio);
    padding: 12px 14px;
    font-size: 13px;
    color: #7a5900;
    display: none;
  }
  .aviso-config.show { display: block; }
  .aviso-config strong { display: block; margin-bottom: 4px; }
</style>
</head>

var scores = {};

function init() {
  // Mostrar aviso si no está configurado
  if (!CONFIGURADO) {
    document.getElementById('aviso-config').classList.add('show');
  }

  // Cargar datos guardados
  try {
    var s = localStorage.getItem('polla2026_scores');
    if (s) scores = JSON.parse(s);
    var n = localStorage.getItem('polla2026_nombre');
    if (n) document.getElementById('participante').value = n;
  } catch(e) {}

  buildPages();
  updateProgress();

  document.getElementById('participante').addEventListener('input', function() {
    localStorage.setItem('polla2026_nombre', this.value);
  });
}

function buildPages() {
  var container = document.getElementById('pages');
  container.innerHTML = '';

  [0, 1, 2].forEach(function(r) {
    var div = document.createElement('div');
    div.className = 'page' + (r === 0 ? ' active' : '');
    div.id = 'page-' + r;

    var html = '';
    var lastFecha = '';
    var ps = PARTIDOS.filter(function(x) { return x.r === r; });

    ps.forEach(function(m) {
      if (m.f !== lastFecha) {
        html += '<div class="fecha-header">📅 ' + m.f + '</div>';
        lastFecha = m.f;
      }
      var gl = (scores['g' + m.p] !== undefined) ? scores['g' + m.p] : '';
      var gv = (scores['v' + m.p] !== undefined) ? scores['v' + m.p] : '';
      var filled = (gl !== '' && gv !== '') ? ' filled' : '';
      var setL = gl !== '' ? ' set' : '';
      var setR = gv !== '' ? ' set' : '';

      html += '<div class="match-card' + filled + '" id="card-' + m.p + '">' +
        '<div class="match-hora">⏰ ' + m.h + ' hs (Col)</div>' +
        '<div class="match-row">' +
          '<div class="team home">' + m.loc + '</div>' +
          '<input class="score-input' + setL + '" id="gl-' + m.p + '" type="number" ' +
            'inputmode="numeric" pattern="[0-9]*" min="0" max="30" ' +
            'value="' + gl + '" placeholder="?" ' +
            'oninput="onScore(' + m.p + ')">' +
          '<div class="sep">:</div>' +
          '<input class="score-input' + setR + '" id="gv-' + m.p + '" type="number" ' +
            'inputmode="numeric" pattern="[0-9]*" min="0" max="30" ' +
            'value="' + gv + '" placeholder="?" ' +
            'oninput="onScore(' + m.p + ')">' +
          '<div class="team away">' + m.vis + '</div>' +
        '</div>' +
      '</div>';
    });

    div.innerHTML = html;
    container.appendChild(div);
  });
}

function onScore(pid) {
  var gl = document.getElementById('gl-' + pid).value;
  var gv = document.getElementById('gv-' + pid).value;
  scores['g' + pid] = gl;
  scores['v' + pid] = gv;

  var inputL = document.getElementById('gl-' + pid);
  var inputR = document.getElementById('gv-' + pid);
  if (gl !== '') inputL.classList.add('set'); else inputL.classList.remove('set');
  if (gv !== '') inputR.classList.add('set'); else inputR.classList.remove('set');

  var card = document.getElementById('card-' + pid);
  if (gl !== '' && gv !== '') card.classList.add('filled');
  else card.classList.remove('filled');

  updateProgress();
}

function updateProgress() {
  var done = 0;
  PARTIDOS.forEach(function(m) {
    if (scores['g'+m.p] !== '' && scores['g'+m.p] !== undefined &&
        scores['v'+m.p] !== '' && scores['v'+m.p] !== undefined) done++;
  });
  var pct = Math.round(done / 72 * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / 72 partidos completados';
}

function showPage(i) {
  document.querySelectorAll('.page').forEach(function(p, idx) {
    p.classList.toggle('active', idx === i);
  });
  document.querySelectorAll('.tab').forEach(function(t, idx) {
    t.classList.toggle('active', idx === i);
  });
  window.scrollTo(0, 0);
}

function guardarLocal() {
  try {
    localStorage.setItem('polla2026_scores', JSON.stringify(scores));
    showToast('💾 Borrador guardado', 'ok');
  } catch(e) {
    showToast('Error al guardar', 'err');
  }
}

  var jornadas = ['Jornada 1 (11–17 Jun)', 'Jornada 2 (18–23 Jun)', 'Jornada 3 (24–27 Jun)'];
  var cuerpo = '🏆 POLLA MUNDIAL 2026\n';
  cuerpo += '👤 Participante: ' + nombre + '\n';
  cuerpo += '📅 Enviado: ' + new Date().toLocaleString('es-CO') + '\n\n';

  var totalCompletados = 0;
  var totalGoles = 0;

  for (var r = 0; r < 3; r++) {
    cuerpo += '═══════════════════════════\n';
    cuerpo += '📋 ' + jornadas[r] + '\n';
    cuerpo += '═══════════════════════════\n';
    var ps = PARTIDOS.filter(function(x) { return x.r === r; });
    var lastF = '';
    ps.forEach(function(m) {
      if (m.f !== lastF) {
        cuerpo += '\n📅 ' + m.f + '\n';
        lastF = m.f;
      }
      var gl = scores['g'+m.p];
      var gv = scores['v'+m.p];
      var marcador = (gl !== '' && gl !== undefined && gv !== '' && gv !== undefined)
        ? gl + ' - ' + gv
        : '? - ?';
      if (gl !== '' && gl !== undefined && gv !== '' && gv !== undefined) {
        totalCompletados++;
        totalGoles += parseInt(gl||0) + parseInt(gv||0);
      }
      cuerpo += '  ' + m.h + ' | ' + padEnd(m.loc, 18) + marcador + '  ' + m.vis + '\n';
    });
    cuerpo += '\n';
  }

  cuerpo += '═══════════════════════════\n';
  cuerpo += '✅ Completados: ' + totalCompletados + '/72\n';
  cuerpo += '⚽ Total goles pronosticados: ' + totalGoles + '\n';

  return cuerpo;
}

function padEnd(str, len) {
  while (str.length < len) str += ' ';
  return str;
}

function enviar() {
  var nombre = document.getElementById('participante').value.trim();
  if (!nombre) {
    showToast('⚠️ Escribe tu nombre primero', 'err');
    document.getElementById('participante').focus();
    return;
  }

  // Validar que todos los 72 partidos estén completos
  var faltantes = [];
  PARTIDOS.forEach(function(m) {
    var gl = scores['g' + m.p];
    var gv = scores['v' + m.p];
    if (gl === '' || gl === undefined || gl === null ||
        gv === '' || gv === undefined || gv === null) {
      faltantes.push(m.p);
    }
  });

  if (faltantes.length > 0) {
    showToast('⚠️ Faltan ' + faltantes.length + ' marcadores por completar', 'err');
    // Ir a la jornada que tiene el primer partido faltante
    var primerFaltante = faltantes[0];
    var partido = PARTIDOS.find(function(x) { return x.p === primerFaltante; });
    if (partido) showPage(partido.r);
    // Resaltar el campo faltante
    setTimeout(function() {
      var el = document.getElementById('gl-' + primerFaltante);
      if (el) { el.focus(); el.scrollIntoView({behavior:'smooth', block:'center'}); }
    }, 300);
    return;
  }

  // Guardar borrador automáticamente
  try { localStorage.setItem('polla2026_scores', JSON.stringify(scores)); } catch(e) {}

  showModal('loading');
  document.getElementById('btn-enviar').disabled = true;

  emailjs.init({publicKey: EMAILJS_PUBLIC_KEY});

  var params = {
    from_name: nombre,
    subject: 'Polla Mundial 2026 - ' + nombre,
    message: buildEmailBody(nombre)
  };

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
    .then(function() {
      showModal('success', nombre);
      document.getElementById('btn-enviar').disabled = false;
    })
    .catch(function(err) {
      hideModal();
      var detalle = err && err.text ? err.text : JSON.stringify(err);
      showToast('❌ Error: ' + detalle, 'err');
      document.getElementById('btn-enviar').disabled = false;
      console.error('EmailJS error:', err);
    });
}

function showModal(type, nombre) {
  var overlay = document.getElementById('overlay');
  var content = document.getElementById('modal-content');
  overlay.classList.add('show');

  if (type === 'loading') {
    content.innerHTML =
      '<div class="spinner"></div>' +
      '<h3>Enviando pronósticos...</h3>' +
      '<p>Un momento por favor</p>';
  } else if (type === 'success') {
    content.innerHTML =
      '<div class="modal-ok">🎉</div>' +
      '<h3>¡Pronósticos enviados!</h3>' +
      '<p style="margin-top:8px">Los pronósticos de <strong>' + (nombre||'') + '</strong> llegaron al organizador.</p>' +
      '<button onclick="hideModal()" style="margin-top:20px;padding:12px 28px;background:#1a5c2a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%">¡Listo! ✓</button>';
  }
}

function hideModal() {
  document.getElementById('overlay').classList.remove('show');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.className = 'toast'; }, 3000);
}

// Cerrar modal al tocar fuera
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) hideModal();
  });
  init();
});
</script>
